<!DOCTYPE html>
<html>
<head>
  <title>Mini League</title>

  <!-- Comfortaa Font -->
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Comfortaa', sans-serif;
      padding: 20px;
      color: white;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      text-align: center;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: #00c6ff;
      font-weight: bold;
      cursor: pointer;
    }

    .delete-btn {
      background: red;
      color: white;
    }

    .winner {
      background: gold !important;
      color: black;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: rgba(255,255,255,0.1);
    }

    th, td {
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGO -->
  <img src="PASTE-YOUR-LOGO-LINK-HERE" style="width:80px; margin-bottom:10px;">

  <h1>🏆Leaderboard-builder🏆 </h1>

  <input id="name" placeholder="Player name">

  <!-- 🌍 COUNTRY SELECT -->
  <select id="country"></select>

  <button onclick="addPlayer()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Country</th>
        <th>Player</th>
        <th>Points</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let players = JSON.parse(localStorage.getItem("league")) || [];

// 🌍 ALL COUNTRIES LIST
const countries = [
"🇦🇫 Afghanistan","🇦🇱 Albania","🇩🇿 Algeria","🇦🇷 Argentina","🇦🇺 Australia",
"🇦🇹 Austria","🇧🇪 Belgium","🇧🇷 Brazil","🇧🇬 Bulgaria","🇨🇦 Canada",
"🇨🇱 Chile","🇨🇳 China","🇨🇴 Colombia","🇭🇷 Croatia","🇨🇿 Czech Republic",
"🇩🇰 Denmark","🇪🇬 Egypt","🇫🇮 Finland","🇫🇷 France","🇩🇪 Germany",
"🇬🇷 Greece","🇭🇺 Hungary","🇮🇳 India","🇮🇩 Indonesia","🇮🇪 Ireland",
"🇮🇱 Israel","🇮🇹 Italy","🇯🇵 Japan","🇰🇪 Kenya","🇲🇽 Mexico",
"🇳🇱 Netherlands","🇳🇿 New Zealand","🇳🇬 Nigeria","🇳🇴 Norway","🇵🇰 Pakistan",
"🇵🇪 Peru","🇵🇭 Philippines","🇵🇱 Poland","🇵🇹 Portugal","🇷🇴 Romania",
"🇷🇺 Russia","🇸🇦 Saudi Arabia","🇷🇸 Serbia","🇸🇬 Singapore","🇿🇦 South Africa",
"🇰🇷 South Korea","🇪🇸 Spain","🇸🇪 Sweden","🇨🇭 Switzerland","🇹🇭 Thailand",
"🇹🇷 Turkey","🇺🇦 Ukraine","🇦🇪 UAE","🇬🇧 United Kingdom","🇺🇸 USA",
"🇻🇳 Vietnam","🇯🇲 Jamaica"
];

// Fill dropdown
const select = document.getElementById("country");
countries.forEach(c => {
  const option = document.createElement("option");
  option.value = c;
  option.textContent = c;
  select.appendChild(option);
});

function save() {
  localStorage.setItem("league", JSON.stringify(players));
}

function render() {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  players.sort((a,b)=>b.points-a.points);

  players.forEach((p, i) => {
    const isWinner = i === 0;

    tbody.innerHTML += `
      <tr class="${isWinner ? 'winner' : ''}">
        <td>${p.country}</td>
        <td>${isWinner ? '🏆 ' : ''}${p.name}</td>
        <td>${p.points}</td>
        <td>
          <button onclick="addPoints(${i},3)">+3</button>
          <button onclick="addPoints(${i},1)">+1</button>
          <button class="delete-btn" onclick="deletePlayer(${i})">❌</button>
        </td>
      </tr>
    `;
  });
}

function addPlayer() {
  const name = document.getElementById("name").value;
  const country = document.getElementById("country").value;

  if (!name) return;

  players.push({ name, country, points: 0 });

  document.getElementById("name").value = "";
  save();
  render();
}

function addPoints(i, pts) {
  players[i].points += pts;
  save();
  render();
}

function deletePlayer(i) {
  players.splice(i, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
