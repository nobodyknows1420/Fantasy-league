<!DOCTYPE html>
<html>
<head>
  <title>Mini League</title>

  <!-- Comfortaa Font -->
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Comfortaa', sans-serif;
      padding: 20px;
      color: white;

      /* Background image (replace if needed later) */
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 65%;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      font-weight: bold;
      margin: 2px;
    }

    button:hover {
      background: #00a3cc;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
    }

    .winner {
      background: gold !important;
      color: black;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: rgba(0,0,0,0.6);
    }

    tr:nth-child(even) {
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 🔥 LOGO (PASTE YOUR RAW LINK HERE) -->
  <img src="PASTE-YOUR-LOGO-LINK-HERE" style="width:80px; margin-bottom:10px;">

  <h1>🏆 Mini League</h1>

  <input id="name" placeholder="Enter player name">
  <button onclick="addPlayer()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Player</th>
        <th>Points</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let players = JSON.parse(localStorage.getItem("league")) || [];

function save() {
  localStorage.setItem("league", JSON.stringify(players));
}

function render() {
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  players.sort((a,b)=>b.points-a.points);

  players.forEach((p, i) => {
    const isWinner = i === 0 && players.length > 0;

    const row = `
      <tr class="${isWinner ? 'winner' : ''}">
        <td>${isWinner ? '🏆 ' : ''}${p.name}</td>
        <td>${p.points}</td>
        <td>
          <button onclick="addPoints(${i},3)">+3</button>
          <button onclick="addPoints(${i},1)">+1</button>
          <button class="delete-btn" onclick="deletePlayer(${i})">Delete</button>
        </td>
      </tr>`;
    tbody.innerHTML += row;
  });
}

function addPlayer() {
  const name = document.getElementById("name").value;
  if (!name) return;
  players.push({name, points:0});
  document.getElementById("name").value = "";
  save();
  render();
}

function addPoints(i, pts) {
  players[i].points += pts;
  save();
  render();
}

function deletePlayer(i) {
  players.splice(i, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
